services:
  mariadb:
    image: mariadb:11
    container_name: mariadb
    logging:
      driver: fluentd
      options:
        fluentd-address: localhost:24224
        fluentd-async: "true"
        tag: docker.mariadb
    environment:
      MARIADB_ROOT_PASSWORD: rootpass
      MARIADB_DATABASE: INFOLOGGER
    volumes:
      - mariadb-data:/var/lib/mysql
      - ./infologger-stack/mariadb/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20
  infologger-server:
    container_name: infologger-server
    platform: linux/amd64
    build:
      context: ./infologger-stack
    image: infologger-server
    logging:
      driver: fluentd
      options:
        fluentd-address: localhost:24224
        fluentd-async: "true"
        tag: docker.infologger-server
    depends_on:
      mariadb:
        condition: service_healthy
    volumes:
      - infologger-socket:/tmp/infologger-socket
      - fluentbit-socket:/tmp/fluent-bit-socket
    ports:
      - "6006:6006"
      - "6007:6007"
      - "6102:6102"
    environment:
      DB_HOST: mariadb
      DB_NAME: INFOLOGGER
      DB_SERVER_USER: infoLoggerServer
      DB_SERVER_PASS: ilgserver
      DB_ADMIN_USER: infoLoggerAdmin
      DB_ADMIN_PASS: ilgadmin
      DB_BROWSER_USER: infoBrowser
      DB_BROWSER_PASS: ilgbrowser
    restart: unless-stopped

  o2-stack:
    container_name: o2-stack
    platform: linux/amd64
    build:
      context: ./o2-stack
    image: o2-stack
    volumes:
      - infologger-socket:/tmp/infologger-socket

volumes:
  mariadb-data:
  infologger-socket:
  fluentbit-socket:
    name: observability-bootstrap_fluentbit-socket
    external: true

networks:
  default:
    name: observability-bootstrap-net
    external: true
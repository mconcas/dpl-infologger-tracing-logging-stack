services:
  mariadb:
    image: mariadb:11
    container_name: mariadb
    logging:
      driver: fluentd
      options:
        fluentd-address: localhost:24224
        fluentd-async: "true"
        tag: docker.mariadb
    environment:
      MARIADB_ROOT_PASSWORD: rootpass
      MARIADB_DATABASE: INFOLOGGER
    volumes:
      - mariadb-data:/var/lib/mysql
      - ./infologger/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20

  infologger-server:
    image: infologger-server:v2.10.1
    platform: linux/amd64
    container_name: infologger-server
    logging:
      driver: fluentd
      options:
        fluentd-address: localhost:24224
        fluentd-async: "true"
        tag: docker.infologger-server
    depends_on:
      mariadb:
        condition: service_healthy

    ports:
      - "6006:6006"
      - "6007:6007"
      - "6102:6102"
    environment:
      DB_HOST: mariadb
      DB_NAME: INFOLOGGER
      DB_SERVER_USER: infoLoggerServer
      DB_SERVER_PASS: ilgserver
      DB_ADMIN_USER: infoLoggerAdmin
      DB_ADMIN_PASS: ilgadmin
      DB_BROWSER_USER: infoBrowser
      DB_BROWSER_PASS: ilgbrowser
    restart: unless-stopped

volumes:
  mariadb-data: